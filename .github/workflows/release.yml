name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Build
        env:
          VERSION: ${{ github.ref_name }}
        run: make build

      - name: Checksum
        run: |
          sha256sum vh-agent-linux-amd64 > vh-agent-linux-amd64.sha256
          cat vh-agent-linux-amd64.sha256

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --title "${TAG_NAME}" \
            --notes "Automated release of ${TAG_NAME}." \
            vh-agent-linux-amd64 \
            vh-agent-linux-amd64.sha256 \
            systemd/vibhost-agent.service
