name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify proto files are up to date
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1
          sudo apt-get update -qq
          sudo apt-get install -y -qq protobuf-compiler
          make proto-gen
          if [ -n "$(git status --porcelain gen/)" ]; then
            echo "ERROR: generated protobuf code is stale. Run 'make proto-gen' and commit."
            git --no-pager diff gen/
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          args: --timeout 5m

      - name: Security scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.21.0
          gosec -quiet ./...

      - name: Tests with race detector
        run: make test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
