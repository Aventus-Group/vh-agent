run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - unparam
    - gosec

linters-settings:
  gosec:
    excludes:
      - G204  # subprocess audited — we intentionally run systemctl and wg

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
