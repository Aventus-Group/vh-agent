run:
  timeout: 5m
  go: "1.24"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell
    - unconvert
    - unparam
    - gosec
    - goimports
    - exhaustive

linters-settings:
  gosec:
    excludes:
      - G204  # subprocess audited — we intentionally run systemctl and wg
  goimports:
    local-prefixes: github.com/Aventus-Group/vh-agent

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
    - path: internal/pb/
      linters:
        - all
