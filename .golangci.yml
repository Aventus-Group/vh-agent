run:
  timeout: 5m
  go: "1.24"

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

linters-settings:
  gosec:
    excludes:
      - G204  # Subprocess launched with variable — vh-agent's whole purpose is running user-provided commands

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
